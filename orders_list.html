<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الطلبات - Sham JB Pro</title>
    <script src="tailwind.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-lg">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">📋 قائمة الطلبات</h1>
            <a href="index.html" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 text-sm">↩️ رجوع</a>
        </div>

        <!-- بحث وفلترة -->
        <div class="bg-white rounded-xl shadow-md p-6 space-y-5 mb-6">
            <h2 class="text-lg font-bold text-gray-700">🔍 بحث وفلترة</h2>
            <input type="text" id="searchBox" oninput="renderOrders()" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="🔍 بحث برقم الطلب، المنتج، أو النوع...">
            <div class="flex gap-2">
                <input type="date" id="dateFrom" onchange="renderOrders()" class="flex-1 border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                <span class="self-center">إلى</span>
                <input type="date" id="dateTo" onchange="renderOrders()" class="flex-1 border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <select id="typeFilter" onchange="renderOrders()" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">🪑 كل الأنواع</option>
                <option value="سفري">🛍️ سفري</option>
                <option value="صالة">🪑 صالة</option>
                <option value="ديليفري">🛵 ديليفري</option>
            </select>
        </div>

        <!-- الطلبات -->
        <div class="bg-white rounded-xl shadow-md p-6 space-y-5">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-700">🧾 الطلبات</h2>
                <button onclick="printOrders()" class="bg-blue-500 text-white px-3 py-2 rounded-lg hover:bg-blue-600 text-sm">🖨️ طباعة</button>
                <button onclick="exportOrdersCSV()" class="bg-emerald-600 text-white px-3 py-2 rounded-lg hover:bg-emerald-700 text-sm">📊 Excel</button>
            </div>
            <div id="ordersList" class="space-y-3 max-h-96 overflow-y-auto"></div>
            <div class="border-t border-gray-200 pt-3 space-y-1">
                <div id="totalAmount" class="text-center font-bold text-green-600 text-lg"></div>
                <div id="totalCount" class="text-center text-gray-600"></div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="hidden fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg text-center z-50"></div>
    </div>

    <script>
        let allOrders = [];
        let currentCurrency = 'SYP', usdRate = 0, eurRate = 0;

        async function loadCurrency() {
            try {
                const r = await fetch('/api/settings/currency');
                const d = await r.json();
                if (d) { currentCurrency = d.currency || 'SYP'; usdRate = d.usd_rate || 0; eurRate = d.eur_rate || 0; }
            } catch (e) {}
        }
        function formatPrice(p) {
            p = p || 0;
            if (currentCurrency === 'USD') return usdRate ? '$' + (p / usdRate).toFixed(2) : (p.toLocaleString() + ' ل.س');
            if (currentCurrency === 'EUR') return eurRate ? '€' + (p / eurRate).toFixed(2) : (p.toLocaleString() + ' ل.س');
            return p.toLocaleString() + ' ل.س';
        }

        async function loadOrders() {
            await loadCurrency();
            try {
                const r = await fetch('/api/orders');
                allOrders = await r.json();
                // ترتيب من الأحدث للأقدم
                allOrders.reverse();
                renderOrders();
            } catch(e) { console.error(e); }
        }

        let lastFilteredOrders = [];

        function renderOrders() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const typeFilter = document.getElementById('typeFilter').value;

            let filtered = allOrders.filter(o => {
                // فلترة النوع
                if (typeFilter && o.type !== typeFilter) return false;
                
                // فلترة التاريخ
                const orderDate = (o.date || o.timestamp || '').substring(0, 10);
                if (dateFrom && orderDate < dateFrom) return false;
                if (dateTo && orderDate > dateTo) return false;

                // فلترة البحث
                if (q) {
                    const itemsText = (o.items || []).map(i => i.name).join(' ');
                    const searchText = `${o.id || ''} ${o.type || ''} ${itemsText}`.toLowerCase();
                    if (!searchText.includes(q)) return false;
                }
                return true;
            });
            lastFilteredOrders = filtered;

            const list = document.getElementById('ordersList');
            let totalAmount = 0;

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-center py-4">لا توجد طلبات</p>';
            } else {
                list.innerHTML = filtered.map((o, i) => {
                    if (!o.voided) totalAmount += o.total || 0;
                    const items = (o.items || []).map((item, itemIdx) => `
                        <div class="text-sm text-gray-600 flex justify-between items-center">
                            <span>• ${item.name} ×${item.quantity || 1}</span>
                            ${!o.voided ? `<button onclick="editOrderItem('${o.id}', ${itemIdx})" class="text-xs text-blue-500 hover:text-blue-700">✏️</button>` : ''}
                        </div>`
                    ).join('');
                    
                    const typeColors = {
                        'سفري': 'text-orange-600 bg-orange-50',
                        'صالة': 'text-blue-600 bg-blue-50',
                        'ديليفري': 'text-purple-600 bg-purple-50'
                    };
                    const typeClass = typeColors[o.type] || 'text-gray-600 bg-gray-50';
                    const typeIcons = { 'سفري': '🛍️', 'صالة': '🪑', 'ديليفري': '🛵' };
                    const typeIcon = typeIcons[o.type] || '🧾';
                    const voidedClass = o.voided ? 'opacity-50' : '';

                    return `
                    <div class="bg-gray-50 rounded-lg border border-gray-200 p-4 ${voidedClass}">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="font-bold text-lg">#${i + 1}</span>
                                <span class="${typeClass} px-2 py-1 rounded text-xs font-bold mr-2">${typeIcon} ${o.type}</span>
                                ${o.voided ? '<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold mr-2">❌ ملغى</span>' : ''}
                                ${o.edited ? '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold mr-2">✏️ معدّل</span>' : ''}
                            </div>
                            <span class="font-bold ${o.voided ? 'text-gray-400 line-through' : 'text-green-600'}">${formatPrice(o.total || 0)}</span>
                        </div>
                        <div class="text-xs text-gray-500 mb-2">📅 ${(o.date || o.timestamp || '').substring(0, 16)} <span dir="ltr" style="unicode-bidi:isolate;">${o.id || ''}</span></div>
                        ${items}
                        ${o.note ? `<div class="text-xs text-gray-400 mt-2">📝 ${o.note}</div>` : ''}
                        ${o.voided
                            ? `<div class="text-xs text-red-500 mt-2">سبب الإلغاء: ${o.void_reason || 'بدون سبب'}</div>`
                            : `<button onclick="voidOrder('${o.id}')" class="mt-2 text-xs bg-red-50 text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-100">❌ إلغاء الطلب</button>`}
                    </div>`;
                }).join('');
            }

            document.getElementById('totalAmount').textContent = 
                filtered.length > 0 ? `💰 إجمالي الطلبات: ${formatPrice(totalAmount)}` : '';
            document.getElementById('totalCount').textContent = 
                filtered.length > 0 ? `🧾 عدد الطلبات: ${filtered.length}` : '';
        }

        async function getManagerCreds() {
            const usersRes = await fetch('/api/settings/users');
            const users = await usersRes.json();
            if (!users || users.length === 0) return { username: '', password: '', ok: true };
            const username = prompt('اسم المستخدم (صلاحية مطلوبة):') || '';
            if (!username) return { ok: false };
            const password = prompt('كلمة المرور:') || '';
            if (!password) return { ok: false };
            return { username, password, ok: true };
        }

        async function editOrderItem(orderId, itemIdx) {
            const order = lastFilteredOrders.find(o => String(o.id) === String(orderId));
            if (!order) return;
            const item = order.items[itemIdx];
            const val = prompt(`تعديل كمية "${item.name}" (الحالية: ${item.quantity || 1}) - أدخل الكمية الجديدة (0 للحذف):`, item.quantity || 1);
            if (val === null) return;
            const newQty = parseInt(val);
            if (isNaN(newQty) || newQty < 0) return showToast('⚠️ كمية غير صحيحة');

            const creds = await getManagerCreds();
            if (!creds.ok) return;
            const reason = prompt('سبب التعديل؟ (اختياري)') || '';
            if (!confirm(`تأكيد تعديل الطلب رقم ${orderId}؟`)) return;

            const newItems = order.items
                .map((it, idx) => idx === itemIdx ? { ...it, quantity: newQty } : it)
                .filter(it => (it.quantity || 0) > 0);

            try {
                const res = await fetch('/api/orders/' + orderId + '/edit-items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: newItems, reason, username: creds.username, password: creds.password })
                });
                const data = await res.json();
                if (data.ok) {
                    showToast('✅ تم تعديل الطلب');
                    await loadOrders();
                } else {
                    showToast('⚠️ ' + (data.error || 'تعذر التعديل'));
                }
            } catch (e) {
                showToast('❌ خطأ بالتعديل');
            }
        }

        async function voidOrder(orderId) {
            const creds = await getManagerCreds();
            if (!creds.ok) return;
            const reason = prompt('سبب إلغاء الطلب؟ (اختياري)') || '';
            if (!confirm('تأكيد إلغاء الطلب رقم ' + orderId + '؟')) return;
            try {
                const res = await fetch('/api/orders/' + orderId + '/void', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason, username: creds.username, password: creds.password })
                });
                const data = await res.json();
                if (data.ok) {
                    showToast('✅ تم إلغاء الطلب');
                    await loadOrders();
                } else {
                    showToast('⚠️ ' + (data.error || 'تعذر الإلغاء'));
                }
            } catch (e) {
                showToast('❌ خطأ بالإلغاء');
            }
        }

        function printOrders() {
            window.print();
        }

        function downloadCSV(filename, rows) {
            const csv = rows.map(r => r.map(cell => {
                const s = String(cell ?? '');
                return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
            }).join(',')).join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function exportOrdersCSV() {
            if (!lastFilteredOrders || lastFilteredOrders.length === 0) return showToast('⚠️ ما في طلبات لتصديرها');
            const rows = [['رقم الطلب', 'التاريخ', 'النوع', 'الأصناف', 'طريقة الدفع', 'الإجمالي', 'الحالة']];
            lastFilteredOrders.forEach(o => {
                const itemsText = (o.items || []).map(i => `${i.name} ×${i.quantity || 1}`).join(' | ');
                rows.push([
                    o.id || '', (o.date || o.timestamp || '').substring(0, 16), o.type || '',
                    itemsText, o.payment || '', o.total || 0, o.voided ? 'ملغى' : 'نشط'
                ]);
            });
            downloadCSV('طلبات_' + new Date().toISOString().slice(0,10) + '.csv', rows);
            showToast('✅ تم تصدير الملف');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        loadOrders();
    </script>
</body>
</html>
