<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الديون - Sham JB Pro</title>
    <script src="tailwind.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-lg">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">💳 الديون</h1>
            <a href="index.html" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 text-sm">↩️ رجوع</a>
        </div>

        <!-- إضافة دين جديد -->
        <div class="bg-white rounded-xl shadow-md p-6 space-y-5 mb-6">
            <h2 class="text-lg font-bold text-gray-700">➕ إضافة دين جديد</h2>
            <input type="text" id="newName" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500 outline-none" placeholder="اسم المدين">
            <input type="number" id="newAmount" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500 outline-none" placeholder="المبلغ">
            <input type="text" id="newNote" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500 outline-none" placeholder="ملاحظات (اختياري)">
            <button onclick="addDebt()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">➕ إضافة</button>
        </div>

        <!-- تعديل ودفع دين -->
        <div class="bg-white rounded-xl shadow-md p-6 space-y-5 mb-6">
            <h2 class="text-lg font-bold text-gray-700">✏️ تعديل / دفع دين</h2>
            <select id="editSelect" onchange="onEditSelect()" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-orange-500 outline-none">
                <option value="">▼ اختر الدين...</option>
            </select>
            <div id="editFields" class="space-y-4 hidden">
                <input type="text" id="editName" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="اسم المدين">
                <input type="number" id="editAmount" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="المبلغ الكلي">
                <input type="text" id="editNote" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="ملاحظات">
                <div class="bg-gray-50 p-3 rounded-lg">
                    <div class="text-sm text-gray-600">المدفوع: <span id="paidAmount" class="font-bold text-green-600">-</span></div>
                    <div class="text-sm text-gray-600">المتبقي: <span id="remainingAmount" class="font-bold text-red-600">-</span></div>
                </div>
                <input type="number" id="payAmount" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="💰 مبلغ الدفع">
                <select id="payMethod" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="نقدي">💵 نقدي</option>
                    <option value="بطاقة">💳 بطاقة</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="payDebt()" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">💰 دفع</button>
                    <button onclick="updateDebt()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">💾 حفظ</button>
                    <button onclick="deleteDebt()" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition">✕ حذف</button>
                </div>
            </div>
        </div>

        <!-- قائمة الديون -->
        <div class="bg-white rounded-xl shadow-md p-6 space-y-5">
            <div class="flex gap-2">
                <input type="text" id="searchBox" oninput="renderDebts()" class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="🔍 بحث...">
                <select id="statusFilter" onchange="renderDebts()" class="border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="all">الكل</option>
                    <option value="active">نشط</option>
                    <option value="paid">مسدد</option>
                </select>
            </div>
            <div id="debtsList" class="space-y-2 max-h-80 overflow-y-auto"></div>
            <div class="border-t border-gray-200 pt-3 space-y-1">
                <div id="totalDebts" class="text-center font-bold text-red-500"></div>
                <div id="totalPaid" class="text-center font-bold text-green-600"></div>
                <div id="totalRemaining" class="text-center font-bold text-orange-500"></div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="hidden fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg text-center z-50"></div>
    </div>

    <script>
        let debts = [];
        let currentEditId = null;
        let currentCurrency = 'SYP', usdRate = 0, eurRate = 0;

        async function loadCurrency() {
            try {
                const r = await fetch('/api/settings/currency');
                const d = await r.json();
                if (d) { currentCurrency = d.currency || 'SYP'; usdRate = d.usd_rate || 0; eurRate = d.eur_rate || 0; }
            } catch (e) {}
        }
        function formatPrice(p) {
            p = p || 0;
            if (currentCurrency === 'USD') return usdRate ? '$' + (p / usdRate).toFixed(2) : (p.toLocaleString() + ' ل.س');
            if (currentCurrency === 'EUR') return eurRate ? '€' + (p / eurRate).toFixed(2) : (p.toLocaleString() + ' ل.س');
            return p.toLocaleString() + ' ل.س';
        }

        async function loadDebts() {
            await loadCurrency();
            const r = await fetch('/api/debts');
            debts = await r.json();
            fillSelects();
            renderDebts();
        }

        function fillSelects() {
            const sel = document.getElementById('editSelect');
            const val = sel.value;
            sel.innerHTML = '<option value="">▼ اختر الدين...</option>';
            debts.forEach(d => {
                const remaining = d.amount - (d.paid || 0);
                const status = remaining <= 0 ? '✅' : '⬅️';
                sel.innerHTML += `<option value="${d.id}">${status} ${d.name} - ${d.amount} (متبقي ${remaining})</option>`;
            });
            if (val) sel.value = val;
        }

        function renderDebts() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            let filtered = debts.filter(d => {
                if (!d.name.toLowerCase().includes(q)) return false;
                const remaining = d.amount - (d.paid || 0);
                if (status === 'active' && remaining <= 0) return false;
                if (status === 'paid' && remaining > 0) return false;
                return true;
            });

            const list = document.getElementById('debtsList');
            let totalDebts = 0, totalPaid = 0, totalRemaining = 0;

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-center py-4">لا توجد ديون</p>';
            } else {
                list.innerHTML = filtered.map(d => {
                    totalDebts += d.amount;
                    totalPaid += (d.paid || 0);
                    const remaining = d.amount - (d.paid || 0);
                    totalRemaining += remaining;
                    const isPaid = remaining <= 0;
                    return `
                    <div class="bg-gray-50 rounded-lg border p-3 ${isPaid ? 'border-green-200 bg-green-50' : 'border-gray-200'}">
                        <div class="flex justify-between items-center">
                            <span class="font-bold">${d.name} ${isPaid ? '✅' : ''}</span>
                            <span class="text-red-500 font-bold">${formatPrice(d.amount)}</span>
                        </div>
                        <div class="flex justify-between text-sm mt-1">
                            <span class="text-green-600">مدفوع: ${formatPrice(d.paid||0)}</span>
                            <span class="${isPaid ? 'text-green-600' : 'text-orange-500'}">متبقي: ${formatPrice(remaining)}</span>
                        </div>
                        ${d.note ? `<div class="text-xs text-gray-400 mt-1">📝 ${d.note}</div>` : ''}
                    </div>`;
                }).join('');
            }

            document.getElementById('totalDebts').textContent = 
                filtered.length > 0 ? `💰 إجمالي الديون: ${formatPrice(totalDebts)}` : '';
            document.getElementById('totalPaid').textContent = 
                filtered.length > 0 ? `✅ المسدد: ${formatPrice(totalPaid)}` : '';
            document.getElementById('totalRemaining').textContent = 
                filtered.length > 0 ? `⬅️ المتبقي: ${formatPrice(totalRemaining)}` : '';
        }

        // ===== إضافة =====
        async function addDebt() {
            const name = document.getElementById('newName').value.trim();
            const amount = parseInt(document.getElementById('newAmount').value) || 0;
            const note = document.getElementById('newNote').value.trim();
            if (!name || !amount) return showToast('⚠️ املأ الاسم والمبلغ');
            await fetch('/api/debts', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, amount, note})
            });
            document.getElementById('newName').value = '';
            document.getElementById('newAmount').value = '';
            document.getElementById('newNote').value = '';
            await loadDebts();
            showToast('✅ تم الإضافة');
        }

        // ===== تعديل =====
        function onEditSelect() {
            const id = parseInt(document.getElementById('editSelect').value);
            if (!id) {
                document.getElementById('editFields').classList.add('hidden');
                return;
            }
            currentEditId = id;
            const d = debts.find(x => x.id === id);
            if (d) {
                document.getElementById('editName').value = d.name;
                document.getElementById('editAmount').value = d.amount;
                document.getElementById('editNote').value = d.note || '';
                document.getElementById('paidAmount').textContent = formatPrice(d.paid||0);
                document.getElementById('remainingAmount').textContent = formatPrice(d.amount - (d.paid||0));
                document.getElementById('payAmount').value = '';
                document.getElementById('editFields').classList.remove('hidden');
            }
        }

        async function updateDebt() {
            if (!currentEditId) return;
            const name = document.getElementById('editName').value.trim();
            const amount = parseInt(document.getElementById('editAmount').value) || 0;
            const note = document.getElementById('editNote').value.trim();
            if (!name || !amount) return showToast('⚠️ املأ الاسم والمبلغ');
            await fetch('/api/debts/' + currentEditId, {
                method: 'PUT', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, amount, note})
            });
            await loadDebts();
            document.getElementById('editSelect').value = '';
            document.getElementById('editFields').classList.add('hidden');
            currentEditId = null;
            showToast('✅ تم التحديث');
        }

        async function payDebt() {
            if (!currentEditId) return;
            const amount = parseInt(document.getElementById('payAmount').value) || 0;
            if (!amount) return showToast('⚠️ أدخل مبلغ الدفع');
            const d = debts.find(x => x.id === currentEditId);
            const remaining = d.amount - (d.paid || 0);
            if (amount > remaining) return showToast('⚠️ المبلغ أكبر من المتبقي');
            
            const res = await fetch('/api/debts/' + currentEditId + '/pay', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({amount, method: document.getElementById('payMethod').value})
            });
            const data = await res.json();
            if (data.ok) {
                await loadDebts();
                onEditSelect();
                showToast('✅ تم الدفع وأضيف للكاشير');
            }
        }

        async function deleteDebt() {
            if (!currentEditId) return;
            if (!confirm('حذف هذا الدين؟')) return;
            await fetch('/api/debts/' + currentEditId, {method: 'DELETE'});
            await loadDebts();
            document.getElementById('editSelect').value = '';
            document.getElementById('editFields').classList.add('hidden');
            currentEditId = null;
            showToast('✅ تم الحذف');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        loadDebts();
    </script>
</body>
</html>
